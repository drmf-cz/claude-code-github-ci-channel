# claude-beacon configuration
#
# All fields are optional — omitted fields keep their default values.
# Pass this file at startup:
#   claude-beacon-mux --config /path/to/this-file.yaml
# Or in .mcp.json args:
#   "args": ["--config", "/path/to/this-file.yaml"]
#
# Environment variables (WEBHOOK_PORT, REVIEW_DEBOUNCE_MS) still override YAML.

# ── Server ────────────────────────────────────────────────────────────────────
server:
  # HTTP port for the incoming GitHub webhook. Env override: WEBHOOK_PORT
  port: 9443

  # Milliseconds to wait after the first review event before firing the batched
  # notification. Gives GitHub time to deliver all events from a single review
  # session before Claude acts. Env override: REVIEW_DEBOUNCE_MS
  debounce_ms: 30000

  # Milliseconds to suppress further notifications for the same PR after one fires.
  # Prevents duplicate responses when a reviewer leaves many comments.
  cooldown_ms: 300000  # 5 minutes

  # Maximum review events buffered per debounce window.
  # Prevents unbounded memory growth on PR review storms.
  max_events_per_window: 50

  # Branch names treated as the production/default branch.
  # CI failures on these branches trigger the escalated on_ci_failure_main instruction.
  main_branches:
    - main
    - master

# ── Webhook filters ───────────────────────────────────────────────────────────
webhooks:
  # REQUIRED — claude-beacon will not start without at least one entry.
  #
  # Controls whose PRs trigger automatic actions (rebase, review response, etc.).
  # Two kinds of entries:
  #
  #   username  (no "@") — matched against the PR author's GitHub login.
  #   email     (with "@") — matched against Co-Authored-By commit headers.
  #             Use this when a bot (e.g. Devin) authors the PR on your behalf;
  #             your email appears in the commit trailer even though the bot is
  #             listed as the PR author.
  #
  # Claude will only act on PRs where the author login OR a commit co-author
  # email matches an entry in this list.
  allowed_authors:
    - YourGitHubUsername
    # - you@company.com  # uncomment if you use Devin or a similar AI coding agent

  # Allowlist of GitHub event types to process.
  # Empty list (default) means all supported events are processed.
  # Useful for narrowing a shared webhook to only the events you care about.
  #
  # Supported values:
  #   push, workflow_run, workflow_job, check_suite, check_run,
  #   pull_request, pull_request_review, pull_request_review_comment,
  #   pull_request_review_thread, issue_comment
  allowed_events: []

  # Allowlist of repositories (owner/repo) to process.
  # Empty list (default) means all repositories posting to this webhook are handled.
  # Example: only process two repos from a shared org webhook.
  allowed_repos: []
  # allowed_repos:
  #   - myorg/frontend
  #   - myorg/backend

# ── Agent behaviour ───────────────────────────────────────────────────────────
# Each section controls the instruction text appended to the channel notification
# Claude receives. Edit these to match your project's workflow and conventions.
#
# Template placeholders use {name} syntax.
# Unknown placeholders are left unchanged, so you can include literal braces
# by using names that don't appear in the variable list for that event.
behavior:

  # ── Worktree mode ────────────────────────────────────────────────────────────
  # Controls how subagents handle rebase / conflict resolution and PR review work.
  #
  #   mode: temp    (default)
  #     Subagents use classic shell commands:
  #       git worktree add {base_dir}/{repo}-pr-<N>-rebase <branch>
  #       ... do work ...
  #       git worktree remove {base_dir}/{repo}-pr-<N>-rebase
  #     The repo slug is included in the path to prevent collisions when multiple
  #     repos share the same machine and both have a PR #42 in flight.
  #
  #   mode: native
  #     Subagents are spawned via Claude Code's Agent tool with isolation="worktree".
  #     Claude manages the worktree lifecycle automatically — no add/remove commands.
  #     Use this if you normally work inside Claude Code native worktrees.
  worktrees:
    mode: temp
    # Base directory for temporary worktrees (mode: temp only). Default: /tmp
    # Override if /tmp is too small, on a tmpfs, or shared across users.
    base_dir: /tmp
  # mode: native  ← uncomment if you use Claude Code native worktrees

  # Triggered when a workflow_run fails on a main/master branch.
  # Placeholders: {repo}, {branch}, {run_url}, {workflow}, {status}, {commit}
  # The special placeholder {health_check_step} is injected automatically based on
  # the upstream_sync field — include it in your instruction where you want the sync
  # step to appear, or omit it to suppress the step entirely.
  on_ci_failure_main:
    # When true (default), a "step 0" is prepended via {health_check_step}:
    # fetch + rebase origin/main before diagnosing. Set to false on repos where
    # main is frequently broken or you handle rebasing separately.
    upstream_sync: true

    # When true (default), Claude spawns a subagent via the Agent tool to fix CI.
    # Set to false for inline fixes in the current session (no subagent spawned).
    # Controls the {use_agent_preamble} placeholder in the instruction template.
    use_agent: true

    instruction: |
      Main branch is broken. Act immediately — no confirmation needed.
      {use_agent_preamble}
      Diagnose and fix the broken CI on main in {repo}:
      {health_check_step}
      1. Call fetch_workflow_logs("{run_url}") to read the failure
      2. Identify the failing step and root cause
      3. Apply a targeted fix in the codebase
      4. Commit and push to restore main
      5. Confirm CI is green.

  # Triggered when a workflow_run fails on a non-main branch.
  # Placeholders: {repo}, {branch}, {run_url}, {workflow}, {status}, {commit}
  # The special placeholder {health_check_step} is injected automatically based on
  # the upstream_sync field — include it in your instruction where you want the sync
  # step to appear, or omit it to suppress the step entirely.
  on_ci_failure_branch:
    # When true (default), a "step 0" is prepended via {health_check_step}:
    # fetch + rebase origin/main before diagnosing. Set to false on repos where
    # main is frequently broken or you handle rebasing separately.
    upstream_sync: true

    # When true (default), Claude spawns a subagent via the Agent tool to fix CI.
    # Set to false for inline fixes in the current session — useful for solo devs
    # who prefer a single context or find subagent latency disruptive.
    use_agent: true

    instruction: |
      Act immediately — no confirmation needed.
      {use_agent_preamble}
      Investigate the CI failure on branch {branch} in {repo}:
      {health_check_step}
      1. Call fetch_workflow_logs("{run_url}") to read the failure
      2. Identify the root cause and fix it
      3. Push the fix to the branch.

  # Triggered when a PR review, inline comment, or unresolved thread arrives.
  # Placeholders in instruction: {skill}, {worktree_preamble}
  #   {skill}             — replaced with the skill field below
  #   {worktree_preamble} — injected automatically based on use_worktree (see below)
  on_pr_review:
    # When true, the instruction must direct the agent to enter plan mode
    # before making any code changes. Strongly recommended.
    require_plan: true

    # Skill invoked during the execution phase.
    skill: pr-comment-response

    # When true, the PR review work runs as a subagent inside a native Claude Code
    # worktree (Agent tool with isolation="worktree"), enabling the main session to
    # handle multiple notifications in parallel without blocking on review work.
    use_worktree: true

    instruction: |
      {worktree_preamble}Plan before acting:
      1. Read every linked thread and summarise what each asks for
      2. List the exact file + change for each thread
      3. Only after planning, use the {skill} skill to execute

      Do NOT apply any fix before the plan step is done.

      Execution phase:
      1. For each comment thread above, open the link and read full context
      2. Code comments: apply the fix, commit
      3. Questions / style: reply inline with a concise explanation
      4. Use gh-pr-reply.sh --batch to post all replies in one shot

  # Triggered when a PR has merge conflicts (mergeable_state=dirty).
  # Placeholders: {repo}, {pr_number}, {pr_title}, {pr_url}, {head_branch},
  #               {base_branch}, {worktree_steps}
  # {worktree_steps} is generated automatically from behavior.worktrees.mode.
  on_merge_conflict:
    instruction: |
      PR #{pr_number} has merge conflicts with {base_branch}. Act immediately — no confirmation needed.

      Use the Agent tool NOW to spawn a subagent with these instructions:
      Resolve merge conflicts for PR #{pr_number} in {repo}:
      {worktree_steps}

  # Triggered when a PR is behind its base branch (mergeable_state=behind).
  # Placeholders: {repo}, {pr_number}, {pr_title}, {pr_url}, {head_branch},
  #               {base_branch}, {worktree_steps}
  # {worktree_steps} is generated automatically from behavior.worktrees.mode.
  on_branch_behind:
    instruction: |
      PR #{pr_number} is behind {base_branch} (no conflicts). Act immediately — no confirmation needed.

      Use the Agent tool NOW to spawn a subagent with these instructions:
      Rebase PR #{pr_number} in {repo}:
      {worktree_steps}

  # Triggered when Dependabot creates or reintroduces a security alert.
  # Actions "dismissed", "fixed", "auto_dismissed", "auto_reopened" are silently skipped.
  # Placeholders: {repo}, {cve}, {package}, {severity}, {alert_url}, {patched_version}
  on_dependabot_alert:
    # Set to true to activate. Disabled by default to avoid conflicts in team setups
    # where multiple Claude Code instances are registered for the same repo — security
    # alerts broadcast to all of them. Enable only on the instance responsible for triage.
    enabled: false

    # Minimum severity to trigger a notification.
    # Values: low | medium | high | critical  (default: medium)
    min_severity: medium
    instruction: |
      🚨 Dependabot alert on {repo}: {severity} vulnerability in {package} ({cve})
      Patched in: {patched_version}
      Details: {alert_url}

      Review the alert and update the dependency to the patched version.

  # Triggered when a code scanning (SAST) alert is created (e.g. CodeQL finding).
  # Actions "fixed", "closed_by_user", "reopened" are silently skipped.
  # Placeholders: {repo}, {rule}, {severity}, {alert_url}, {branch}, {tool}
  on_code_scanning_alert:
    # Set to true to activate. Same opt-in rationale as on_dependabot_alert above.
    enabled: false

    # Minimum severity to trigger a notification.
    # Values: note | warning | error  (default: warning)
    min_severity: warning
    instruction: |
      🔍 Code scanning alert on {repo} ({branch}): {rule} [{severity}] via {tool}
      Details: {alert_url}

      Review the finding and apply a fix.

  # Triggered when a PR is opened, reopened, or marked ready for review.
  # Disabled by default — enable only on the session responsible for automated review.
  # Placeholders: {repo}, {pr_number}, {pr_title}, {pr_url}, {head_branch}, {base_branch}, {author}
  on_pr_opened:
    enabled: false
    instruction: |
      New PR #{pr_number} opened by {author}: "{pr_title}"
      Repo: {repo} | Branch: {head_branch} → {base_branch}
      URL: {pr_url}

      Review the PR and leave comments on any issues.

  # Triggered when a reviewer submits an APPROVED review.
  # Disabled by default. When enabled, APPROVED reviews use this handler instead of on_pr_review.
  # Placeholders: {repo}, {pr_number}, {pr_title}, {pr_url}, {reviewer}
  on_pr_approved:
    enabled: false
    instruction: |
      PR #{pr_number} "{pr_title}" has been approved by {reviewer}.
      Repo: {repo} | URL: {pr_url}

      The PR is approved — merge when ready or address any remaining tasks.

# ── Code style guidelines ─────────────────────────────────────────────────────
# Free-text block prepended to every PR review notification.
# Use this to communicate project conventions so the agent applies them
# when responding to review comments.
#
# Leave empty (default) to omit this section from notifications.
code_style: ""

# Example:
# code_style: |
#   - TypeScript strict mode; no `any`, no `!` assertions.
#   - Prefer functional patterns; avoid class mutation.
#   - All exported symbols must have JSDoc comments.
#   - Tests go in src/__tests__/ as *.test.ts files using bun:test.
#   - Format with Biome before committing.
