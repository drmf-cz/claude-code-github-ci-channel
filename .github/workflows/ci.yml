name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Version bump check
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          BASE_VERSION=$(git show origin/main:package.json | jq -r '.version')
          CURRENT_VERSION=$(jq -r '.version' package.json)
          if [ "$BASE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::error::package.json version ($CURRENT_VERSION) is unchanged from main. Bump the version before merging."
            exit 1
          fi
          echo "✅ Version bumped: $BASE_VERSION → $CURRENT_VERSION"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test --coverage

      - name: Build
        run: bun run build
