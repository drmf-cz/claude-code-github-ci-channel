name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        type: boolean
        default: false

jobs:
  # ── CI gate — same checks as the regular CI workflow ─────────────────────────
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

  # ── Build & publish ───────────────────────────────────────────────────────────
  publish:
    name: Build & publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release
      id-token: write   # npm provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build distributable bundles
        run: bun run build

      - name: Verify binaries
        run: |
          test -x dist/index.js || { echo "dist/index.js not executable"; exit 1; }
          test -x dist/mux.js   || { echo "dist/mux.js not executable"; exit 1; }
          head -1 dist/index.js | grep -q "#!/usr/bin/env bun" || { echo "Missing shebang in dist/index.js"; exit 1; }
          head -1 dist/mux.js   | grep -q "#!/usr/bin/env bun" || { echo "Missing shebang in dist/mux.js"; exit 1; }

      # Node.js is only needed for the npm CLI — the package itself runs on Bun
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run — show what would be published
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/index.js
            dist/mux.js
            config.example.yaml
            .env.example
